<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: #010615eb;
            color: white;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #020216;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            margin: 10px 0;
            text-decoration: none;
        }

        .sidebar a:hover {
            color: white;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .table {
            color: white;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h4>FaceAttend</h4>
        <a href="/dashboard"><i class="bi bi-grid"></i> Dashboard</a>
        <a href="/register"><i class="bi bi-person-plus"></i> Register</a>
        <a href="/students"><i class="bi bi-people"></i> Students</a>
        <a href="/records"><i class="bi bi-clipboard-data"></i> Records</a>
        <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
        <a href="/export"><i class="bi bi-download"></i> Export Attendance</a>
    </div>

    <div class="main">
        <h2>👨‍🎓 Students List</h2>

        <table class="table table-dark table-striped mt-4">
    <thead>
        <tr>
            <th>SR no</th>
            <th>Name</th>
            <th>Roll NO</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for s in data %}
        <tr>
            <td>{{ s[0] }}</td>
             <td>{{ s[1]}}</td>
              <td>{{ s[2] }}</td>
               
            <td>
                <a href="/edit/{{ s[0] }}" class="btn btn-warning">Edit</a>  
                
                <a href="/delete_student/{{ s[0] }}" 
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

    </div>

</body>

</html>

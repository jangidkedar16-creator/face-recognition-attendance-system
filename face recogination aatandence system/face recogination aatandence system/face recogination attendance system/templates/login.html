<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0c2742, #0f1f3f);
        }

        .login-container {
            background: #090615;
            padding: 40px;
            width: 100%;
            max-width: 350px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(187, 86, 86, 0.2);
        }

        h2 {
            text-align: center ;
            margin-bottom: 25px;
            color: #9a9595;
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;

            /* auto adjust based on text */
            min-width: 100%;
        }

        .input-box input:focus {
            border-color: #2a5298;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2a5298;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #1e3c72;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .login-container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Admin Login</h2>

        <form method="POST">
            <div class="input-box">
                <input type="text" name="username" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
            </div>

            <button class="btn" type="submit">Login</button>
        </form>
    </div>

</body>
</html>

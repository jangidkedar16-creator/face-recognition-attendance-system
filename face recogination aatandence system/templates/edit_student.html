<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="style.css.css">
</head>
<body class="bg-dark text-white">

<div class="container mt-5">
    <h2>Edit Student</h2>

    <form method="POST">
        <input type="text" name="name" value="{{ student[1] }}" class="form-control mb-3" required>
       <input type="text" name="roll" value="{{ student[1] }}" class="form-control mb-3" required>
        

        <button class="btn btn-success">Update</button>
        <a href="/students" class="btn btn-secondary">Back</a>
    </form>
</div>

</body>
</html>
